name: Build & Release Agent Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck agent-linux
        run: bun run --filter @backupos/agent-linux typecheck

      - name: Typecheck agent-windows
        run: bun run --filter @backupos/agent-windows typecheck

  build:
    name: Build ${{ matrix.artifact }}
    needs: typecheck
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: agent-linux
            script: build:x64
            artifact: backupos-agent-linux-x64
          - package: agent-linux
            script: build:arm64
            artifact: backupos-agent-linux-arm64
          - package: agent-linux
            script: build:darwin-x64
            artifact: backupos-agent-darwin-x64
          - package: agent-linux
            script: build:darwin-arm64
            artifact: backupos-agent-darwin-arm64
          - package: agent-windows
            script: build:x64
            artifact: backupos-agent-windows-x64.exe
          - package: agent-windows
            script: build:arm64
            artifact: backupos-agent-windows-arm64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Create dist directory
        run: mkdir -p apps/${{ matrix.package }}/dist

      - name: Build ${{ matrix.artifact }}
        env:
          AGENT_VERSION: ${{ github.ref_name }}
        run: bun run --filter @backupos/${{ matrix.package }} ${{ matrix.script }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: apps/${{ matrix.package }}/dist/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate SHA256 checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS.txt && cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/backupos-agent-linux-x64
            dist/backupos-agent-linux-arm64
            dist/backupos-agent-darwin-x64
            dist/backupos-agent-darwin-arm64
            dist/backupos-agent-windows-x64.exe
            dist/backupos-agent-windows-arm64.exe
            dist/SHA256SUMS.txt
