name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

# Cancel superseded runs on the same ref to avoid wasted Actions minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript build + typecheck
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.15.0'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

  go-services:
    name: Go services build + vet
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        service:
          - backupos-pbs
          - backupos-xcp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build
        working-directory: services/${{ matrix.service }}
        run: go build ./...

      - name: Vet
        working-directory: services/${{ matrix.service }}
        run: go vet ./...
